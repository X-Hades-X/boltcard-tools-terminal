name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint, type-check and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run lint (eslint + tsc --noemit)
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --ci
